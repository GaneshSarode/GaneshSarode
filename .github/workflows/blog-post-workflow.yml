name: Latest blog post workflow

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # REPLACE THIS COMMA-SEPARATED LIST WITH YOUR ACTUAL BLOG/YOUTUBE FEED URLs
          # e.g., "https://medium.com/feed/@yourusername, https://dev.to/feed/yourusername"
          feed_list: "https://dev.to/feed/GaneshSarode"
